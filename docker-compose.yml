version: "3.9"

name: commercebrain

services:
  postgres:
    image: postgres:17
    container_name: commercebrain-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "${POSTGRES_PORT}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - commercebrain-network

  redis:
    image: redis:7-alpine
    container_name: commercebrain-redis

    restart: unless-stopped

    ports:
      - "${REDIS_PORT}:6379"

    command:
      [
        "redis-server",
        "--appendonly",
        "yes"
      ]

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - commercebrain-network

volumes:
  postgres_data:
  redis_data:

networks:
  commercebrain-network:
    driver: bridge
